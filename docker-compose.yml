services:
  web:
    image: ghcr.io/hinkolas/serverless-transcoding-demo-web:${APP_VERSION:-v0.1.0}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: /data/local.db
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      RUNPOD_MODE: ${RUNPOD_MODE:-real}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      SIGNED_URL_TTL_SECONDS: ${SIGNED_URL_TTL_SECONDS:-300}
      RUNPOD_EXECUTION_TIMEOUT_MS: ${RUNPOD_EXECUTION_TIMEOUT_MS:-7200000}
      RUNPOD_TTL_MS: ${RUNPOD_TTL_MS:-86400000}
    volumes:
      - web_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  web_data:
